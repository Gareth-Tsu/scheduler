<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            background: #16213e;
            padding: 40px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        h2 { text-align: center; margin-bottom: 24px; }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 14px;
            background: #1a1a2e;
            border: 1px solid #444;
            border-radius: 4px;
            color: #e0e0e0;
            font-size: 14px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #0f3460;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 15px;
        }
        button:hover { background: #4a90d9; }
        .error {
            color: #e74c3c;
            font-size: 13px;
            margin-bottom: 12px;
            text-align: center;
        }
        .link {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
        }
        a { color: #4a90d9; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Register</h2>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Create Account</button>
        </form>
        <div class="link">Already have an account? <a href="/login">Login</a></div>
    </div>
</body>
</html>
